<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Vellum logo</title><desc id="desc">Three luminous translucent sheets forming a V</desc>
  <defs>
    <linearGradient id="shell" x1="7" y1="3" x2="58" y2="61" gradientUnits="userSpaceOnUse"><stop stop-color="#23253B"/><stop offset=".52" stop-color="#0C0E19"/><stop offset="1" stop-color="#05060C"/></linearGradient>
    <linearGradient id="back" x1="12" y1="12" x2="44" y2="52" gradientUnits="userSpaceOnUse"><stop stop-color="#42D8D1" stop-opacity=".9"/><stop offset="1" stop-color="#427DFF" stop-opacity=".55"/></linearGradient>
    <linearGradient id="mid" x1="23" y1="10" x2="50" y2="52" gradientUnits="userSpaceOnUse"><stop stop-color="#D49CFF" stop-opacity=".95"/><stop offset="1" stop-color="#695CFF" stop-opacity=".68"/></linearGradient>
