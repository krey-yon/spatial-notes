    <radialGradient id="iris" cx="0" cy="0" r="1" gradientTransform="translate(170 25) rotate(38) scale(570 440)" gradientUnits="userSpaceOnUse"><stop stop-color="#7B70FF" stop-opacity=".52"/><stop offset="1" stop-color="#6879FF" stop-opacity="0"/></radialGradient>
    <radialGradient id="rose" cx="0" cy="0" r="1" gradientTransform="translate(1080 610) rotate(-140) scale(520 370)" gradientUnits="userSpaceOnUse"><stop stop-color="#E45CBB" stop-opacity=".25"/><stop offset="1" stop-color="#E45CBB" stop-opacity="0"/></radialGradient>
    <linearGradient id="sheetA" x1="23" y1="22" x2="102" y2="112" gradientUnits="userSpaceOnUse"><stop stop-color="#42D8D1"/><stop offset="1" stop-color="#427DFF"/></linearGradient><linearGradient id="sheetB" x1="46" y1="18" x2="108" y2="112" gradientUnits="userSpaceOnUse"><stop stop-color="#D49CFF"/><stop offset="1" stop-color="#695CFF"/></linearGradient><linearGradient id="sheetC" x1="38" y1="23" x2="105" y2="110" gradientUnits="userSpaceOnUse"><stop stop-color="#FFFFFF"/><stop offset=".35" stop-color="#DCD8FF"/><stop offset="1" stop-color="#568CFF"/></linearGradient>
